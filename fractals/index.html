<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fractals</title>
    <script type="module" crossorigin src="./assets/index-BcM-EtCc.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-hg1rzLTZ.css">
  </head>
  <body>
    <div id="boot-splash" class="boot-splash" data-phase="initializing" data-stage="0" aria-live="polite" aria-label="Loading Fractals">
      <div class="boot-splash__backdrop"></div>
      <div class="boot-splash__grid"></div>
      <div class="boot-splash__core">
        <div class="boot-splash__device">
          <div class="boot-splash__halo"></div>
          <div class="boot-splash__ring"></div>
          <div class="boot-splash__progress-ring" data-boot-progress-ring></div>
          <div class="boot-splash__nodes" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>
        <div class="boot-splash__wordmark">Fractals</div>
        <div class="boot-splash__status">
          <div class="boot-splash__label">Web Render Boot Sequence</div>
          <div class="boot-splash__phase" data-boot-phase-label>Initializing visual engine</div>
          <div class="boot-splash__detail" data-boot-detail>Preparing web runtime</div>
        </div>
        <div class="boot-splash__meter" aria-hidden="true">
          <div class="boot-splash__meter-track">
            <div class="boot-splash__meter-fill" data-boot-progress></div>
          </div>
          <div class="boot-splash__meter-steps">
            <span class="is-active"></span><span></span><span></span><span></span><span></span>
          </div>
        </div>
      </div>
    </div>
    <div id="root"></div>
  </body>
</html>
